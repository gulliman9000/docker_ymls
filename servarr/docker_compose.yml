---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/sonarr:/config
      - /media:/media #optional
      - /downloads:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped
  sonarr4k:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr4k
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/sonarr4k:/config
      - /media:/media #optional
      - /downloads:/downloads #optional
    ports:
      - 8990:8989
    restart: unless-stopped    
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/radarr:/config
      - /media:/media #optional
      - /downloads:/downloads #optional
    ports:
      - 7878:7878
    restart: unless-stopped
  radarr4k:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr4k
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/radarr4k:/config
      - /media:/media #optional
      - /downloads:/downloads #optional
    ports:
      - 7879:7878
    restart: unless-stopped    
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/lidarr:/config
      - /media:/media #optional
      - /downloads:/downloads #optional
    ports:
      - 8686:8686
    restart: unless-stopped
  sportarr:
    image: sportarr/sportarr:latest
    container_name: sportarr
    network_mode: bridge
    environment:
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
    volumes:
      - /docker/sportarr:/config
      - /media/Sportsing:/data #optional
      - /downloads:/downloads #optional
    ports:
      - 1867:1867
    restart: unless-stopped
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    network_mode: bridge
    environment:
      - LOG_LEVEL=debug
      - TZ=Australia/Melbourne
    ports:
      - 5055:5055
    volumes:
      - /docker/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
  musicseerr:
    image: ghcr.io/habirabbu/musicseerr:latest
    container_name: musicseerr
    network_mode: bridge
    environment:
      - LOG_LEVEL=debug
      - PUID=0
      - PGID=0
      - TZ=Australia/Melbourne
      - UMASK=002
      - PORT=8688
    ports:
      - "8688:8688"
    volumes:
      - /docker/musicseerr:/app/config  # Persistent app configuration
      - /docker/musicseerr/cache:/app/cache    # Cover art and metadata cache
      # Optional: mount your music library for local file playback.
      # The left side should match the root folder Lidarr uses.
      # The right side (/music) must match "Music Directory Path" in Settings > Local Files.
      - /media/music:/music:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8688/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  umlautadaptarr:
    image: pcjones/umlautadaptarr:latest
    container_name: umlautadaptarr
    network_mode: bridge    
    restart: unless-stopped
    ports:
      - "5006:5006" # can be removed if you use the alternative, non-proxy configuration
    environment:
      - TZ=Australia/Melbourne
      - SONARR__0__NAME=Sonarr
      - SONARR__0__ENABLED=false
      - SONARR__0__HOST=http://localhost:8989
      - SONARR__0__APIKEY=9fd7ee6606f84db990710984bfb7971e
      - SONARR__1__NAME=Sonarr4k      
      - SONARR__1__ENABLED=e049d4b6864f44f3a1a2fecab3a29aff
      - SONARR__1__HOST=http://localhost:8990
      - SONARR__1__APIKEY=APIKEY  
      - RADARR__0__NAME=Radarr   
      - RADARR__0__ENABLED=false
      - RADARR__0__HOST=http://localhost:7878
      - RADARR__0__APIKEY=b8a38b528fdc47ea9480d6b687dab773
      - RADARR__1__NAME=Radarr   
      - RADARR__1__ENABLED=false
      - RADARR__1__HOST=http://localhost:7878
      - RADARR__1__APIKEY=b8a38b528fdc47ea9480d6b687dab773      
      - LIDARR__ENABLED=false
      - LIDARR__HOST=http://localhost:8686
      - LIDARR__APIKEY=1d876d29ed354d8b9153338b292943e7